<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="status-bar-style" content="black-translucent">
    <title>Sudoku - Free, Beautiful, Smooth</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Sudoku Library from CDN (we'll implement custom logic if this fails, but sudoku.js is standard) -->
    <script src="sudoku.js" type="module"></script>
    <script src="main.js" type="module" defer></script>
</head>
<body>
    <div id="app">
        <!-- Difficulty Modal -->
        <div id="difficulty-modal" class="modal hidden">
            <div class="glass-panel modal-content">
                <h2>Choose Level</h2>
                <div class="difficulty-buttons">
                    <button class="btn difficulty-btn" data-difficulty="easy">Easy</button>
                    <button class="btn difficulty-btn" data-difficulty="medium">Medium</button>
                    <button class="btn difficulty-btn" data-difficulty="hard">Hard</button>
                    <button class="btn difficulty-btn" data-difficulty="very-hard">Expert</button>
                </div>
                <button id="close-diff-btn" class="btn" style="margin-top: 16px;">Cancel</button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen active">
            <div class="game-header">
                <div class="difficulty-display" id="difficulty-display">
                    <div class="diff-label">Difficulty</div>
                    <div class="diff-value" id="current-diff-text">Extreme</div>
                </div>
                <div class="timer" id="timer">00:00</div>
                <button id="restart-btn" class="icon-btn" title="Restart puzzle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                </button>
            </div>

            <div class="board-container">
                <div id="sudoku-board" class="sudoku-board">
                    <!-- Grid cells will be generated by JS -->
                </div>
            </div>

            <div class="controls">
                <div class="tools">
                    <button id="undo-btn" class="tool-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
                        <span>Undo</span>
                    </button>
                    <button id="notes-toggle" class="tool-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        <span>Notes: OFF</span>
                    </button>
                    <button id="erase-btn" class="tool-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H4M16 4l4 4-10 10H6v-4L16 4z"/></svg>
                        <span>Erase</span>
                    </button>
                </div>
                
                <div class="numpad" id="numpad">
                    <!-- Numbers 1-9 generated by JS -->
                </div>
            </div>
        </div>
        
        <!-- Win Modal -->
        <div id="win-modal" class="modal hidden">
            <div class="glass-panel modal-content">
                <h2>Puzzle Solved!</h2>
                <p id="win-time">Time: 00:00</p>
                <button id="new-game-btn" class="btn primary-btn">Play Again</button>
            </div>
        </div>
        
        <!-- Lose Modal -->
        <div id="lose-modal" class="modal hidden">
            <div class="glass-panel modal-content">
                <h2>Game Over</h2>
                <button id="try-again-btn" class="btn primary-btn">Try Again</button>
            </div>
        </div>
    </div>
</body>
</html>
